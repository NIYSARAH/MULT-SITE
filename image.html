<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module IMAGES - MULTI-SITE</title>
<style>
    body {font-family:'Segoe UI',sans-serif; margin:0; color:#1f2937; background:#f8f0f8;}
    
    /* HEADER */
    header {
        background: linear-gradient(135deg,#ff66cc,#cc33ff);
        color:white;
        padding:20px;
        position: relative;
        text-align:center;
        box-shadow:0 4px 6px rgba(0,0,0,0.1);
    }
    header a {
        position:absolute;
        left:20px;
        top:50%;
        transform:translateY(-50%);
        text-decoration:none;
        color:white;
        font-size:20px;
        font-weight:bold;
        transition:0.3s;
    }
    header a:hover {color:#ffe6ff;}
    header h1 {margin:0;font-size:28px;}
    header p {margin:5px 0 0 0; font-size:16px; color:#ffe6ff;}

    /* MAIN */
    main{padding:2rem; max-width:900px; margin:0 auto;}
    h2{color:#800080;text-align:center;margin-bottom:20px;}
    
    /* Galerie images */
    #imageGallery{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px;}
    #imageGallery img{
        width:100%;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(204,51,255,0.2);
        transition:transform 0.3s, box-shadow 0.3s;
        cursor:pointer;
    }
    #imageGallery img:hover{
        transform:scale(1.05);
        box-shadow:0 10px 25px rgba(204,51,255,0.3);
    }

    /* Sélecteur */
    #imageSelect{
        width:50%;
        padding:10px;
        border-radius:10px;
        border:2px solid #fbcfe8;
        margin:0 auto 20px auto;
        display:block;
        font-size:16px;
    }

    /* FOOTER */
    footer{background: linear-gradient(135deg,#cc33ff,#ff66cc); color:white; text-align:center; padding:2rem; margin-top:20px; font-weight:bold;}
</style>
</head>
<body>

<header>
    <a href="index.html">← ACCUEIL</a><br>
    <h1>MULTI-SITE</h1>
    <p>Module IMAGES</p> 
</header>

<main>
    <h2>Galerie d’Images</h2>
    
    <select id="imageSelect">
        <option value="TTT.jpg">Image 2</option>
        <option value="GGK.jpg">Image 1</option>
      
    </select>

  
</main>
<br><br><br><br><br><br><br><br><br><br><br><br><br><br>
<footer>
    © 2026 MULTI-SITE - Plateforme Multimédia
</footer>


</body>
</html>
