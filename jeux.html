<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module JEUX - MULTI-SITE</title>
<style>
    body {font-family:'Segoe UI',sans-serif; margin:0; color:#1f2937; background:#f8f0f8;}
    
    /* HEADER */
    header {
        background: linear-gradient(135deg,#ff66cc,#cc33ff);
        color:white;
        padding:20px;
        position: relative;
        text-align:center;
        box-shadow:0 4px 6px rgba(0,0,0,0.1);
    }
    header a {
        position:absolute;
        left:20px;
        top:50%;
        transform:translateY(-50%);
        text-decoration:none;
        color:white;
        font-size:20px;
        font-weight:bold;
        transition:0.3s;
    }
    header a:hover {color:#ffe6ff;}
    header h1 {margin:0;font-size:28px;}
    header p {margin:5px 0 0 0; font-size:16px; color:#ffe6ff;}
    
    /* MAIN */
    main{padding:2rem; max-width:800px; margin:0 auto; display:grid; gap:2rem;}
    .game-card{background:white; border-radius:20px; padding:2rem; box-shadow:0 10px 25px rgba(190,24,93,0.15);}
    .game-card h3{color:#9d174d; font-size:1.5rem; margin-bottom:1rem; text-align:center;}
    .game-input{width:100%; padding:1rem; margin:1rem 0; border:2px solid #fbcfe8; border-radius:10px; font-size:1rem;}
    .game-btn{background:#db2777; color:white; border:none; padding:1rem 2rem; border-radius:50px; font-size:1.1rem; font-weight:600; cursor:pointer; margin:0.5rem;}
    .game-btn:hover{background:#831843;}
    .game-btn.reset{background:#f472b6;}
    .game-btn.reset:hover{background:#be185d;}
    #gameResult{margin-top:1rem; padding:1rem; border-radius:10px; font-weight:500; text-align:center;}
    .success{background:#d1fae5; color:#065f46; border:2px solid #34d399;}
    .error{background:#fee2e2; color:#991b1b; border:2px solid #f87171;}
    .info{background:#fce7f3; color:#9d174d; border:2px solid #fbcfe8;}
    
    /* FOOTER */
    footer{background: linear-gradient(135deg,#cc33ff,#ff66cc); color:white; text-align:center; padding:2rem; margin-top:20px; font-weight:bold;}
</style>
</head>
<body>

<header>
    <a href="index.html">← ACCUEIL</a><br>
    <h1>MULTI-SITE</h1>
    <p>Module JEUX</p> 
</header>

<main>

    <div class="game-card">
        <h3>🧮 Calcul mental</h3>
        <div style="font-size:2rem; text-align:center; margin:1rem 0;">
            <span id="num1">5</span> + <span id="num2">3</span> = ?
        </div>
        <input type="number" id="calcInput" class="game-input" placeholder="Votre réponse">
        <div style="text-align:center;">
            <button class="game-btn" onclick="checkCalculation()">Vérifier</button>
            <button class="game-btn reset" onclick="newCalculation()">Nouveau</button>
        </div>
        <div id="calcResult" class="info">Calculez et vérifiez</div>
    </div>
</main>
<br><br><br><br>
<footer>
    © 2026 MULTI-SITE - Plateforme Multimédia
</footer>

<script>

    // Calcul mental
    let num1, num2, correctAnswer;
    function generateNewNumbers(){num1=Math.floor(Math.random()*10)+1; num2=Math.floor(Math.random()*10)+1; correctAnswer=num1+num2; document.getElementById('num1').textContent=num1; document.getElementById('num2').textContent=num2;}
    function checkCalculation(){const userAnswer=parseInt(document.getElementById('calcInput').value); const calcResult=document.getElementById('calcResult'); if(isNaN(userAnswer)){calcResult.className='error'; calcResult.textContent='❌ Entrez un nombre'; return;}
        if(userAnswer===correctAnswer){calcResult.className='success'; calcResult.textContent='✓ Correct !'; generateNewNumbers();} 
        else{calcResult.className='error'; calcResult.textContent=`❌ Faux: ${correctAnswer}`;}
        document.getElementById('calcInput').value='';
    }
    function newCalculation(){generateNewNumbers(); document.getElementById('calcResult').className='info'; document.getElementById('calcResult').textContent='Nouveau calcul';}
    generateNewNumbers();
</script>

</body>
</html>
