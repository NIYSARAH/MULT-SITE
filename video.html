<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module VIDÉO - MULTI-SITE</title>
<style>
    body {
        font-family:'Segoe UI',sans-serif;
        margin:0;
        color:#1f2937;
        background:#f8f0f8; /* fond doux rose clair */
    }

    /* HEADER */
    header {
        background: linear-gradient(135deg,#ff66cc,#cc33ff); /* dégradé rose/violet */
        color: white;
        padding: 25px 0;
        text-align: center;
        position: relative;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    header a {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        text-decoration: none;
        color: white;
        font-size: 20px;
        font-weight: bold;
        transition: 0.3s;
    }
    header a:hover {
        color: #ffe6ff;
    }
    header h1 {
        margin: 0;
        font-size: 30px;
        letter-spacing: 1px;
    }
    header p {
        margin: 5px 0 0 0;
        font-size: 16px;
        color: #ffe6ff;
    }

    /* MAIN */
    main {
        padding:2rem;
        max-width:1200px;
        margin:0 auto;
    }
    .video-grid {
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
        gap:2rem;
    }
    .video-card {
        background: #fff0ff;
        border-radius: 15px;
        overflow: hidden;
        box-shadow:0 8px 20px rgba(204,51,255,0.2);
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .video-card:hover {
        transform: translateY(-5px);
        box-shadow:0 12px 25px rgba(204,51,255,0.3);
    }
    .video-card video {
        width:100%;
        display:block;
        border-bottom: 4px solid #cc33ff;
        border-radius: 0;
    }
    .video-info {
        padding:1rem;
        text-align: center;
    }
    .video-info h4 {
        color:#9d174d;
        margin-bottom:0.5rem;
        font-weight: 600;
    }

    /* FOOTER */
    footer {
        background: linear-gradient(135deg,#cc33ff,#ff66cc);
        color:white;
        text-align:center;
        padding:2rem;
        margin-top: 30px;
        font-weight: bold;
        letter-spacing: 1px;}
    }

    /* RESPONSIVE */
    @media (max-width: 500px){
        header h1 { font-size:24px; }
        header p { font-size:14px; }
        header a { font-size:18px; }
    }
</style>
</head>
<body>

<header>
    <a href="index.html">← ACCUEIL</a><br>
    <h1>MULTI-SITE</h1>
    <p>Module VIDÉO</p> 
</header>

<main>
    <div class="video-grid">
        <div class="video-card">
            <video controls poster="media/1111.jpg">
                <source src="media/1111.mp4" type="video/mp4">
            </video>
            <div class="video-info"><h4>Vidéo 1</h4></div>
        </div>
        <div class="video-card">
            <video controls poster="media/1112.jpg">
                <source src="media/1112.mp4" type="video/mp4">
            </video>
            <div class="video-info"><h4>Vidéo 2</h4></div>
        </div>
        <div class="video-card">
            <video controls poster="media/1113.jpg">
                <source src="media/1113.mp4" type="video/mp4">
            </video>
            <div class="video-info"><h4>Vidéo 3</h4></div>
        </div>
    </div>
</main>
<br><br><br><br><br><br><br><br><br>
<footer>
    © 2026 MULTI-SITE - Plateforme Multimédia
</footer>

</body>
</html>
